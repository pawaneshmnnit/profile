        // --- CORE SCRIPT LOGIC ---
        document.addEventListener('DOMContentLoaded', () => {
            const themeToggleBtn = document.getElementById('theme-toggle');
            const applyTheme = (theme) => {
                document.documentElement.classList.toggle('dark', theme === 'dark');
            };
            const savedTheme = localStorage.getItem('color-theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
            applyTheme(savedTheme);
            themeToggleBtn.addEventListener('click', () => {
                const newTheme = document.documentElement.classList.contains('dark') ? 'light' : 'dark';
                localStorage.setItem('color-theme', newTheme);
                applyTheme(newTheme);
            });

            document.getElementById('current-year').textContent = new Date().getFullYear();
            
            const savedLang = localStorage.getItem('language') || 'en';
            switchLanguage(savedLang);

            const menuToggle = document.getElementById('menu-toggle');
            const mainNav = document.getElementById('main-nav');
            const navButtons = document.querySelectorAll('.nav-button');
            const contentSections = document.querySelectorAll('.content-section');

            menuToggle.addEventListener('click', () => { mainNav.classList.toggle('hidden'); });

            navButtons.forEach(button => {
                button.addEventListener('click', () => {
                    const targetId = button.dataset.target;
                    navButtons.forEach(btn => btn.classList.remove('active'));
                    button.classList.add('active');
                    contentSections.forEach(section => {
                        section.classList.toggle('hidden', section.id !== targetId);
                    });
                    if (window.innerWidth < 1024) {
                        mainNav.classList.add('hidden');
                    }
                });
            });
        });

        function switchLanguage(lang) {
            if (!translations[lang]) return;
            document.querySelectorAll('[data-translate-key]').forEach(el => {
                const key = el.getAttribute('data-translate-key');
                if (translations[lang][key]) {
                    el.innerHTML = translations[lang][key];
                }
            });
            localStorage.setItem('language', lang);
            // Let the loader re-render the About paragraph in the new language
            if (window.SiteLoader && typeof window.SiteLoader.setLanguage === 'function') {
                window.SiteLoader.setLanguage(lang);
            }
            if (typeof event !== 'undefined' && event) event.preventDefault();
        }

        function toggleDropdown(id) {
            const content = document.getElementById(id);
            const icon = document.getElementById(id.replace('-list', '-icon'));
            content.classList.toggle('open');
            icon.classList.toggle('rotate-180');
        }
