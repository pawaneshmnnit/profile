<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pawanesh | MNNIT</title>

<script src="https://cdn.tailwindcss.com"></script>

<script>
window.tailwind = window.tailwind || {};
tailwind.config = {
    safelist: [
        { pattern: /bg-(blue|green|yellow|purple|red|pink|indigo|teal)-(100|900)/ },
        { pattern: /text-(blue|green|yellow|purple|red|pink|indigo|teal)-(300|800)/ }
    ]
};
</script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

<style>
body { font-family: 'Inter', sans-serif; }

/* scrollbar */
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: #f1f1f1; }
.dark ::-webkit-scrollbar-track { background: #1f2937; }
::-webkit-scrollbar-thumb { background: #888; border-radius: 10px; }
.dark ::-webkit-scrollbar-thumb { background: #555; }

/* timeline */
.timeline-item::before {
    content: '';
    position: absolute;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    left: -6px;
    top: 4px;
    background-color: #3b82f6;
    border: 2px solid #ffffff;
}

/* nav */
.nav-button.active {
    background-color: #1f2937;
    color: #ffffff;
}
.dark .nav-button.active {
    background-color: #db3218;
}

/* dropdown FIXED */
.lang-menu-content {
    display: none;
    position: absolute;
    right: 0;
    top: 100%;
    background-color: #ffffff;
    min-width: 160px;
    box-shadow: 0 8px 16px rgba(0,0,0,0.2);
    z-index: 50;
    border-radius: 0.5rem;
    margin-top: 0.5rem;
}
.lang-menu-content.open {
    display: block;
}
.dark .lang-menu-content {
    background-color: #374151;
}

/* collapse */
.collapse-content {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.5s ease-in-out;
}
.collapse-content.open {
    max-height: 1000px;
}

.collapse-scroll-wrapper {
    max-height: 600px;
    overflow-y: auto;
    padding-right: 1rem;
}

#footer { background-color:#374151; }
.dark #footer { background-color:#db3218; }

.footer-icon { display:inline-block; }
</style>
</head>

<body class="bg-white dark:bg-gray-800 text-gray-800 dark:text-gray-200 transition-colors duration-300">

<div class="container mx-auto max-w-4xl px-4 py-8">

<header class="relative mb-8">

<div class="absolute top-0 right-0 flex items-center space-x-4 z-20">

<!-- LANGUAGE -->
<div class="lang-menu relative">
<button id="lang-btn" class="border px-3 py-1 rounded-md">
<span data-translate-key="lang_button">Languages ▾</span>
</button>

<div id="lang-menu" class="lang-menu-content">
<a href="#" data-lang="en">English</a>
<a href="#" data-lang="hi">Hindi</a>
<a href="#" data-lang="de">German</a>
<a href="#" data-lang="fr">French</a>
</div>
</div>

<!-- THEME -->
<button id="theme-toggle" class="border px-3 py-1 rounded-md">
<span class="dark:hidden">Dark</span>
<span class="hidden dark:inline">Light</span>
</button>

</div>

<br><br>

<div class="text-center pt-12">
<h1 class="text-4xl font-bold text-gray-900 dark:text-white" data-translate-key="name">
Pawanesh Kumar Vishwakarma
</h1>
</div>

<hr>
</header>

<nav id="main-nav" class="flex flex-wrap justify-center gap-2 mb-12">
<button class="nav-button active px-4 py-2 bg-gray-200 dark:bg-gray-700 rounded" data-target="about">About</button>
<button class="nav-button px-4 py-2 bg-gray-200 dark:bg-gray-700 rounded" data-target="experience">Experience</button>
<button class="nav-button px-4 py-2 bg-gray-200 dark:bg-gray-700 rounded" data-target="education">Education</button>
<button class="nav-button px-4 py-2 bg-gray-200 dark:bg-gray-700 rounded" data-target="skills">Skills</button>
<button class="nav-button px-4 py-2 bg-gray-200 dark:bg-gray-700 rounded" data-target="awards">Awards</button>
<button class="nav-button px-4 py-2 bg-gray-200 dark:bg-gray-700 rounded" data-target="publications">Publications</button>
</nav>

<main>
<div class="flex justify-center mb-12">
<img src="pic2.jpg" alt="Profile" loading="lazy" class="w-40 h-40 rounded-lg object-cover">
</div>

<section id="about" class="content-section">
<p id="about-text">Loading…</p>
</section>

<section id="experience" class="content-section hidden">
<div id="experience-items">Loading…</div>
</section>

<section id="education" class="content-section hidden">
<div id="education-items">Loading…</div>
</section>

<section id="skills" class="content-section hidden">
<div id="skills-groups">Loading…</div>
</section>

<section id="awards" class="content-section hidden">
<ul id="awards-items"><li>Loading…</li></ul>
</section>

<section id="publications" class="content-section hidden">
<div id="journal-items"></div>
<div id="conference-items"></div>
<div id="poster-items"></div>
</section>

</main>
</div>

<footer class="text-white text-center p-4 mt-16" id="footer">
<p>&copy; <span id="current-year"></span> Pawanesh Kumar Vishwakarma</p>
</footer>

<script>
document.addEventListener("DOMContentLoaded", () => {

    // Theme
    const themeToggle = document.getElementById("theme-toggle");
    themeToggle.addEventListener("click", () => {
        document.documentElement.classList.toggle("dark");
    });

    // Language Dropdown FIXED
    const langBtn = document.getElementById("lang-btn");
    const langMenu = document.getElementById("lang-menu");

    langBtn.addEventListener("click", () => {
        langMenu.classList.toggle("open");
    });

    document.querySelectorAll("[data-lang]").forEach(el => {
        el.addEventListener("click", (e) => {
            e.preventDefault();
            const lang = el.dataset.lang;
            switchLanguage(lang);
            langMenu.classList.remove("open");
        });
    });

    // Nav
    const navButtons = document.querySelectorAll(".nav-button");
    const sections = document.querySelectorAll(".content-section");

    navButtons.forEach(btn => {
        btn.addEventListener("click", () => {
            navButtons.forEach(b => b.classList.remove("active"));
            btn.classList.add("active");

            sections.forEach(sec => {
                sec.classList.toggle("hidden", sec.id !== btn.dataset.target);
            });
        });
    });

    document.getElementById("current-year").textContent = new Date().getFullYear();
});

// FIXED function
function switchLanguage(lang) {
    localStorage.setItem('language', lang);

    if (window.SiteLoader?.setLanguage) {
        window.SiteLoader.setLanguage(lang);
    }
}
</script>

<script src="site-loader.js"></script>

</body>
</html>
